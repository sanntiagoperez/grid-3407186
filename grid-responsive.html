<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Productos</title>
    <link rel="stylesheet" href="grid-responcsive.css">
</head>
<body>

<section class="grid-container">

    <h2 class="gallery_title">Conoce nuestros productos</h2>

    <div class="gallery_grid">

        <figure class="gallery_item">
            <img class="gallery_img" src="./img_galeria/cocacola.jpg" alt="Pepsi">
            <h3>Pepsi en lata</h3>
            <p>Precio: $20.00</p>
        </figure>

        <figure class="gallery_item">
            <img class="gallery_img" src="./img_galeria/bici.jpg" alt="Bicicleta BMX">
            <h3>Bicicleta BMX</h3>
            <p>Precio: $80.00</p>
        </figure>

        <figure class="gallery_item">
            <img class="gallery_img" src="./img_galeria/3.jpg" alt="Repuesto">
            <h3>Repuesto de garaje</h3>
            <p>Precio: $750.00</p>
        </figure>

        <figure class="gallery_item">
            <img class="gallery_img" src="./img_galeria/4.jpg" alt="Obra de arte">
            <h3>Obra de arte 2000</h3>
            <p>Precio: $100.00</p>
        </figure>

        <figure class="gallery_item">
            <img class="gallery_img" src="./img_galeria/5.jpg" alt="Obra de arte">
            <h3>Obra de arte 1990</h3>
            <p>Precio: $500.00</p>
        </figure>

        <figure class="gallery_item">
            <img class="gallery_img" src="./img_galeria/6.jpg" alt="BMW M4">
            <h3>BMW M4</h3>
            <p>Precio: $3000.00</p>
        </figure>

    </div>

</section>

</body>
</html>
